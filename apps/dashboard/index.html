<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HQ Dashboard - POS Central System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" crossorigin />
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e8e7f1",
            "tertiary-container": "#872d00",
            "inverse-primary": "#b8c4ff",
            "secondary-container": "#d0e1fb",
            "secondary-fixed": "#d3e4fe",
            "outline": "#757684",
            "secondary": "#505f76",
            "surface-bright": "#fbf8ff",
            "tertiary": "#611e00",
            "inverse-surface": "#2f3037",
            "on-tertiary-fixed": "#380d00",
            "on-secondary-fixed-variant": "#38485d",
            "on-background": "#1a1b22",
            "background": "#fbf8ff",
            "on-error-container": "#93000a",
            "error-container": "#ffdad6",
            "on-primary-container": "#a8b8ff",
            "on-tertiary-container": "#ffa583",
            "surface-container-lowest": "#ffffff",
            "on-secondary-container": "#54647a",
            "on-surface-variant": "#444653",
            "surface-dim": "#dad9e3",
            "surface-variant": "#e3e1eb",
            "outline-variant": "#c4c5d5",
            "inverse-on-surface": "#f1f0fa",
            "primary-fixed": "#dde1ff",
            "primary-fixed-dim": "#b8c4ff",
            "surface": "#fbf8ff",
            "surface-container": "#eeedf7",
            "surface-container-low": "#f4f2fc",
            "tertiary-fixed": "#ffdbce",
            "on-secondary": "#ffffff",
            "on-primary-fixed-variant": "#173bab",
            "secondary-fixed-dim": "#b7c8e1",
            "on-secondary-fixed": "#0b1c30",
            "on-tertiary-fixed-variant": "#802a00",
            "tertiary-fixed-dim": "#ffb59a",
            "surface-tint": "#3755c3",
            "primary-container": "#1e40af",
            "on-primary-fixed": "#001453",
            "surface-container-highest": "#e3e1eb",
            "error": "#ba1a1a",
            "on-surface": "#1a1b22",
            "on-error": "#ffffff",
            "primary": "#00288e",
            "on-primary": "#ffffff"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          spacing: {
            sidebar_width: "280px",
            container_gutter: "24px",
            table_cell_padding: "12px 16px",
            element_gap: "16px"
          },
          fontFamily: {
            "label-md": ["Inter"],
            "label-sm": ["Inter"],
            "display-sm": ["Inter"],
            "body-md": ["Inter"],
            "headline-sm": ["Inter"],
            "body-sm": ["Inter"],
            "section-header": ["Inter"]
          },
          fontSize: {
            "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }],
            "display-sm": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "body-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
            "section-header": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }]
          }
        },
      },
    }

<style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .sidebar-active { background-color: #1e40af !important; color: #ffffff !important; border-left: 4px solid #ffffff; }
    .status-pill { padding: 2px 12px; border-radius: 9999px; font-weight: 600; font-size: 12px; }
    .status-active { background-color: #dcfce7; color: #166534; }
    .status-inactive { background-color: #f1f5f9; color: #475569; }
    .status-error { background-color: #fee2e2; color: #991b1b; }
    .status-ok { color: #166534; font-weight: 700; }
    .table-row-hover:hover { background-color: #f8fafc; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
